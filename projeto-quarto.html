<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interior Bedroom | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter'; background:#f2f2f2; }
h1 { font-family:'Playfair Display'; font-size:48px; }
p { color:#666; }

.hero { height:60vh; }
.hero img { width:100%; height:100%; object-fit:cover; }

.container { max-width:1000px; margin:auto; padding:60px 20px; }

.gallery { display:grid; gap:20px; margin-top:40px; }
.gallery img { width:100%; transition:0.5s; }
.gallery img:hover { transform:scale(1.03); }

.back { text-decoration:none; color:black; display:inline-block; margin-bottom:20px; }

.reveal { opacity:0; transform:translateY(50px); transition:1s; }
.reveal.show { opacity:1; transform:translateY(0); }
</style>
</head>

<body>

<div class="hero">
<img src="render-quarto.jpg">
</div>

<div class="container">
<a href="index.html" class="back">← Back</a>

<h1 class="reveal">Interior Bedroom</h1>

<p class="reveal">
A cozy bedroom visualization designed to highlight textures, lighting, and comfort.
The project focuses on creating a warm and realistic atmosphere.
</p>

<div class="gallery">
<img src="render-quarto.jpg" class="reveal">
<img src="render-quarto.jpg" class="reveal">
<img src="render-quarto.jpg" class="reveal">
</div>
</div>

<script>
const elements = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
if (entry.isIntersecting) entry.target.classList.add('show');
});
});
elements.forEach(el => observer.observe(el));
</script>

</body>
</html>
