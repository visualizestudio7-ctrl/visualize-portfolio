<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Medical Clinic | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter'; background:#f2f2f2; }

h1 { font-family:'Playfair Display'; font-size:clamp(32px,5vw,48px); }
p { color:#666; line-height:1.6; max-width:700px; }

#swup { transition:0.6s cubic-bezier(0.22,1,0.36,1); }
html.is-animating #swup { opacity:0; transform:translateY(20px); }
html.is-leaving #swup { opacity:0; transform:scale(0.98); }

.reveal { opacity:0; transform:translateY(60px); transition:1.2s; }
.reveal.show { opacity:1; transform:translateY(0); }

.hero { height:60vh; }
.hero img { width:100%; height:100%; object-fit:cover; }

.container { max-width:1100px; margin:auto; padding:80px 20px; }

.gallery {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:30px;
margin-top:50px;
}

.gallery img { width:100%; border-radius:6px; transition:0.5s; }
.gallery img:hover { transform:scale(1.05); }

.back { display:inline-block; margin-bottom:30px; text-decoration:none; color:black; }

@media(max-width:768px){
.container{padding:50px 20px;}
.gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div id="swup">

<div class="hero">
<img src="render-clinica.jpg">
</div>

<div class="container">

<a href="index.html" class="back">← Back to Home</a>

<h1 class="reveal">Medical Clinic</h1>

<p class="reveal">
This project was designed to communicate a clean, modern and professional medical environment.
The focus was on neutral tones, soft lighting and a welcoming atmosphere to attract clients.
</p>

<div class="gallery">
<img src="render-clinica.jpg" class="reveal">
<img src="render-clinica.jpg" class="reveal">
<img src="render-clinica.jpg" class="reveal">
</div>

</div>
</div>

<script src="https://unpkg.com/swup@4"></script>

<script>
const swup = new Swup();

function initAnimations(){
const els=document.querySelectorAll('.reveal');
const obs=new IntersectionObserver(e=>{
e.forEach(i=>{ if(i.isIntersecting) i.target.classList.add('show'); });
});
els.forEach(el=>obs.observe(el));
}

initAnimations();

swup.hooks.on('page:view', () => {
initAnimations();
});
</script>

</body>
</html>
