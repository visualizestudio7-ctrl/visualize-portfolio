<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

/* 🔥 RESET CONTROLADO (SEM QUEBRAR BOTÃO) */
a {
  text-decoration: none !important;
  color: inherit;
}

/* BASE */
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f2f2f2;
  color:#111;
  overflow-x:hidden;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity 0.8s ease, visibility 0.8s;
}

#loader.hide {
  opacity:0;
  visibility:hidden;
}

.loader-inner {
  width:40px;
  height:40px;
  border:1px solid rgba(255,255,255,0.3);
  border-top:1px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

/* TIPOGRAFIA */
h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(36px,6vw,72px);
  line-height:1.05;
}

h2 {
  font-size:28px;
  margin-bottom:40px;
}

p {
  color:#666;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
  overflow:hidden;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PARALLAX */
.hero.parallax img {
  transform: translateY(var(--scroll,0)) scale(1.05);
}

.overlay {
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.3));
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero-content {
  max-width:650px;
  color:white;
}

.hero p {
  margin-top:20px;
  font-size:18px;
  color:rgba(255,255,255,0.85);
}

/* 🔥 BOTÃO 100% CORRIGIDO */
.cta,
.cta:link,
.cta:visited,
.cta:hover,
.cta:active {
  display:inline-block;
  margin-top:30px;
  padding:14px 28px;
  background:white;
  color:#111 !important;
  font-size:14px;
  letter-spacing:0.5px;
  border-radius:2px;
  transition:0.3s;
}

.cta:hover {
  background:#ddd;
}

/* SEÇÃO */
.section {
  padding:120px 20px;
}

.container {
  max-width:1100px;
  margin:auto;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:40px;
}

/* PROJETOS */
.project {
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.4s ease;
}

.project:hover {
  transform:translateY(-8px);
}

.project img {
  width:100%;
  height:420px;
  object-fit:cover;
  transition:transform 0.6s ease;
}

.project:hover img {
  transform:scale(1.05);
}

/* OVERLAY */
.project::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
  opacity:0;
  transition:0.4s;
}

.project:hover::after {
  opacity:1;
}

.project-info {
  margin-top:15px;
}

.project-info h3 {
  margin:0;
}

.project-info p {
  font-size:14px;
}

/* CONTACT */
.contact {
  background:#111;
  color:white;
  text-align:center;
  padding:60px 20px;
}

.contact p {
  color:#aaa;
  font-size:16px;
}

/* ANIMAÇÃO APPLE */
.reveal {
  opacity:0;
  transform:translateY(50px) scale(0.98);
  filter:blur(10px);

  transition:
    opacity 1s cubic-bezier(0.22,1,0.36,1),
    transform 1s cubic-bezier(0.22,1,0.36,1),
    filter 1.2s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity:1;
  transform:translateY(0) scale(1);
  filter:blur(0);
}

/* MOBILE */
@media(max-width:768px){

  .grid {
    grid-template-columns:1fr;
    gap:30px;
  }

  .project img {
    height:260px;
  }

  .section {
    padding:80px 20px;
  }

}

/* 🔥 LANG SWITCH */
.lang-switch {
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:8px;
}

.lang-switch button {
  background:rgba(255,255,255,0.2);
  border:none;
  color:white;
  padding:6px 10px;
  cursor:pointer;
  font-size:12px;
  backdrop-filter:blur(6px);
  transition:0.3s;
}

.lang-switch button:hover {
  background:rgba(255,255,255,0.4);
}

/* 🔥 WHATSAPP BUTTON */
.wpp-btn,
.wpp-btn:link,
.wpp-btn:visited,
.wpp-btn:hover,
.wpp-btn:active {
  position:fixed;
  bottom:20px;
  right:20px;

  background:#25D366;
  color:white !important;

  padding:12px 18px;
  border-radius:50px;

  font-size:14px;
  font-weight:500;

  display:flex;
  align-items:center;
  gap:8px;

  box-shadow:0 8px 20px rgba(0,0,0,0.2);

  transition:0.3s;
  z-index:999;
}

.wpp-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-inner"></div>
</div>

<!-- HERO -->
<div class="hero parallax">
  <img src="render-clinica.jpg">

  <div class="overlay">

    <div class="lang-switch">
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('es')">ES</button>
    </div>

    <div class="hero-content">
      <h1 class="reveal"
        data-en="We create images that define how architecture is perceived."
        data-pt="Criamos imagens que definem como a arquitetura é percebida."
        data-es="Creamos imágenes que definen cómo se percibe la arquitectura.">
      </h1>

      <p class="reveal"
        data-en="Photorealistic visualization for architects and developers."
        data-pt="Visualização 3D fotorrealista para arquitetos e incorporadoras."
        data-es="Visualización 3D fotorrealista para arquitectos y desarrolladores.">
      </p>

      <a href="#" class="cta reveal"
        data-en="Request a Quote"
        data-pt="Solicitar Orçamento"
        data-es="Solicitar Presupuesto"
        style="color:#111;">
      </a>
    </div>
  </div>
</div>

<!-- WORK -->
<div class="section">
  <div class="container">

    <h2 class="reveal"
      data-en="Selected Work"
      data-pt="Projetos Selecionados"
      data-es="Proyectos Seleccionados">
    </h2>

    <div class="grid">

      <a href="projeto-casa.html" class="project reveal">
        <img src="render-casa.jpg">
        <div class="project-info">
          <h3 data-en="Modern House" data-pt="Casa Moderna" data-es="Casa Moderna"></h3>
          <p data-en="Residential visualization" data-pt="Visualização residencial" data-es="Visualización residencial"></p>
        </div>
      </a>

      <a href="projeto-clinica.html" class="project reveal">
        <img src="render-clinica.jpg">
        <div class="project-info">
          <h3 data-en="Medical Clinic" data-pt="Clínica Médica" data-es="Clínica Médica"></h3>
          <p data-en="Commercial project" data-pt="Projeto comercial" data-es="Proyecto comercial"></p>
        </div>
      </a>

      <a href="projeto-quarto.html" class="project reveal">
        <img src="render-quarto.jpg">
        <div class="project-info">
          <h3 data-en="Interior Bedroom" data-pt="Quarto" data-es="Dormitorio"></h3>
          <p data-en="Interior visualization" data-pt="Visualização interna" data-es="Visualización interior"></p>
        </div>
      </a>

      <a href="projeto-recepcao.html" class="project reveal">
        <img src="render-recepcao.jpg">
        <div class="project-info">
          <h3 data-en="Reception Area" data-pt="Recepção" data-es="Recepción"></h3>
          <p data-en="Corporate space" data-pt="Espaço corporativo" data-es="Espacio corporativo"></p>
        </div>
      </a>

    </div>

  </div>
</div>

<!-- CONTACT -->
<div class="contact">

  <h2 class="reveal"
    data-en="Contact"
    data-pt="Contato"
    data-es="Contacto">
  </h2>

  <p class="reveal">visualize.studio.7@gmail.com</p>
  <p class="reveal">@_visualize.studio_</p>

</div>

<!-- WHATSAPP -->
<a href="https://wa.me/5599999999999" class="wpp-btn" target="_blank">
  💬 Faça seu orçamento
</a>

<!-- JS -->
<script>

/* LOADER */
window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  setTimeout(() => {
    loader.classList.add('hide');
  }, 500);
});

/* ANIMAÇÃO */
function initAnimations(){
  const elements = document.querySelectorAll('.reveal');

  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const el = entry.target;
        const index = [...elements].indexOf(el);
        const delay = Math.pow(index, 0.9) * 0.08;
        el.style.transitionDelay = delay + "s";
        el.classList.add('show');
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.15 });

  elements.forEach(el => observer.observe(el));
}

initAnimations();

/* PARALLAX */
window.addEventListener('scroll', () => {
  const scroll = window.scrollY;
  document.documentElement.style.setProperty('--scroll', scroll * 0.1 + 'px');
});

/* MOUSE EFFECT */
document.querySelectorAll('.project').forEach(card => {
  card.addEventListener('mousemove', (e)=>{
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;

    card.querySelector('img').style.transform =
      `scale(1.05) translate(${x*10}px, ${y*10}px)`;
  });

  card.addEventListener('mouseleave', ()=>{
    card.querySelector('img').style.transform = "scale(1)";
  });
});

/* LANG */
function setLang(lang){
  document.querySelectorAll('[data-en]').forEach(el => {
    const text = el.getAttribute(`data-${lang}`);
    if(text) el.textContent = text;
  });
  localStorage.setItem('lang', lang);
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('lang') || 'en';
  setLang(saved);
});

</script>

</body>
</html>
