<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visualize Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TIPOGRAFIA PREMIUM -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f2f2f2;
      overflow-x: hidden;
    }

    /* TÍTULOS */
    h1, h2 {
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.5px;
    }

    h1 {
      font-size: 64px;
      line-height: 1.1;
      font-weight: 600;
    }

    h2 {
      font-size: 32px;
      font-weight: 500;
    }

    p {
      font-size: 16px;
      color: #555;
    }

    /* ANIMAÇÃO ESTILO APPLE */
    .reveal {
      opacity: 0;
      transform: translateY(60px) scale(0.98);
      transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .delay-1 { transition-delay: 0.15s; }
    .delay-2 { transition-delay: 0.3s; }
    .delay-3 { transition-delay: 0.45s; }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 110%;
      object-fit: cover;
      transition: transform 0.1s linear;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.45);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
    }

    /* SEÇÕES */
    .section {
      padding: 80px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap: 20px;
    }

    /* IMAGENS */
    .img-wrap {
      overflow: hidden;
    }

    .img-wrap img {
      width: 100%;
      display: block;
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
                  filter 0.8s ease;
    }

    .img-wrap:hover img {
      transform: scale(1.08);
      filter: brightness(1.08);
    }

    /* CONTACT */
    .contact {
      background: black;
      color: white;
      padding: 60px;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <img id="hero-img" src="render-clinica.jpg">

    <div class="overlay">
      <h1 class="reveal delay-1">
        We create images that sell architecture.
      </h1>

      <p class="reveal delay-2">
        Photorealistic 3D visualization for architects and developers.
      </p>
    </div>
  </div>

  <!-- WORK -->
  <div class="section">
    <h2 class="reveal delay-1">Selected Work</h2>

    <div class="grid">
      <div class="img-wrap reveal delay-1">
        <img src="render-casa.jpg">
      </div>

      <div class="img-wrap reveal delay-2">
        <img src="render-clinica.jpg">
      </div>

      <div class="img-wrap reveal delay-2">
        <img src="render-quarto.jpg">
      </div>

      <div class="img-wrap reveal delay-3">
        <img src="render-recepcao.jpg">
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <h2 class="reveal delay-1">Contact</h2>
    <p class="reveal delay-2">visualize.studio.7@gmail.com</p>
    <p class="reveal delay-3">@_visualize.studio_</p>
  </div>

  <!-- SCRIPT -->
  <script>
    // ANIMAÇÃO REVEAL
    const elements = document.querySelectorAll('.reveal');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.15 });

    elements.forEach(el => observer.observe(el));

    // PARALLAX HERO
    const heroImg = document.getElementById('hero-img');

    window.addEventListener('scroll', () => {
      heroImg.style.transform = `translateY(${window.scrollY * 0.3}px)`;
    });
  </script>

</body>
</html>
