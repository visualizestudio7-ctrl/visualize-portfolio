<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern House | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f2f2f2;
}

/* TIPOGRAFIA */
h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(32px,5vw,56px);
  margin-bottom:20px;
}

p {
  color:#666;
  max-width:600px;
}

/* TRANSIÇÃO */
#swup {
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
}

html.is-animating #swup {
  opacity:0;
  transform:translateY(20px);
}

html.is-leaving #swup {
  opacity:0;
  transform:scale(0.98);
}

/* ANIMAÇÃO */
.reveal {
  opacity:0;
  transform:translateY(60px);
  transition:1.2s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero {
  height:60vh;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SEÇÃO */
.section {
  padding:80px 20px;
}

.container {
  max-width:900px;
  margin:auto;
}

/* 🔥 BACK CORRIGIDO */
.back,
.back:link,
.back:visited,
.back:hover,
.back:active {
  color:black !important;
  text-decoration:none !important;
  font-weight:500;
  display:inline-block;
  margin-bottom:30px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:24px;
  margin-top:40px;
}

/* IMAGENS */
.project img {
  width:100%;
  height:auto;
  display:block;
  border-radius:6px;
  transition:0.4s ease;
}

.project img:hover {
  transform:scale(1.03);
}

/* MOBILE */
@media(max-width:768px){

  .section {
    padding:50px 16px;
  }

  .grid {
    grid-template-columns:1fr;
    gap:20px;
  }

}

/* LANG */
.lang-switch {
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:8px;
}

.lang-switch button {
  background:rgba(0,0,0,0.5);
  border:none;
  color:white;
  padding:6px 10px;
  cursor:pointer;
  font-size:12px;
}

/* WPP */
.wpp-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:50px;
  font-size:14px;
  font-weight:500;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  z-index:999;
}
</style>
</head>

<body>

<div id="swup">

  <!-- HERO -->
  <div class="hero">
    <img src="render-casa.jpg">

    <!-- LANG -->
    <div class="lang-switch">
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('pt')">PT</button>
      <button onclick="setLang('es')">ES</button>
    </div>

  </div>

  <!-- CONTEÚDO -->
  <div class="section">
    <div class="container">

      <a href="index.html" class="back">
        ← Back to Home
      </a>

      <h1 class="reveal"
        data-en="Modern House"
        data-pt="Casa Moderna"
        data-es="Casa Moderna">
      </h1>

      <p class="reveal"
        data-en="High-end residential visualization focused on light, materials and atmosphere."
        data-pt="Visualização residencial de alto padrão focada em luz, materiais e atmosfera."
        data-es="Visualización residencial de alto nivel centrada en luz, materiales y atmósfera.">
      </p>

      <div class="grid">

        <div class="project reveal">
          <img src="render-casa.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa1.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa2.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa3.jpg">
        </div>

      </div>

    </div>
  </div>

</div>

<!-- WPP -->
<a href="https://wa.me/5599999999999" class="wpp-btn" target="_blank">
  💬 Faça seu orçamento
</a>

<!-- SWUP -->
<script src="https://unpkg.com/swup@4"></script>

<script>
const swup = new Swup();

function initAnimations(){
  const els = document.querySelectorAll('.reveal');

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });

  els.forEach(el=>obs.observe(el));
}

initAnimations();

swup.hooks.on('page:view', () => {
  initAnimations();
});

/* LANG */
function setLang(lang){
  document.querySelectorAll('[data-en]').forEach(el => {
    const text = el.getAttribute(`data-${lang}`);
    if(text) el.textContent = text;
  });
  localStorage.setItem('lang', lang);
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('lang') || 'en';
  setLang(saved);
});
</script>

</body>
</html>
