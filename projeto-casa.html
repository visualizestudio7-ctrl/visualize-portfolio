<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern House | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f2f2f2;
}

/* TIPOGRAFIA */
h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(32px,5vw,48px);
}

p {
  color:#666;
  line-height:1.6;
  max-width:700px;
}

/* TRANSIÇÃO */
#swup {
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
}

html.is-animating #swup {
  opacity:0;
  transform:translateY(20px);
}

html.is-leaving #swup {
  opacity:0;
  transform:scale(0.98);
}

/* ANIMAÇÃO */
.reveal {
  opacity:0;
  transform:translateY(60px);
  transition:1.2s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero {
  height:60vh;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTAINER */
.container {
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

/* BACK */
.back {
  display:inline-block;
  margin-bottom:30px;
  text-decoration:none;
  color:black;
  font-weight:500;
}

.back:hover {
  opacity:0.6;
}

/* GALERIA */
.gallery {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:30px;
  margin-top:50px;
}

.gallery img {
  width:100%;
  height:auto;
  display:block;
  border-radius:6px;
  object-fit:contain;
  background:#eee;
  transition:0.4s;
}

.gallery img:hover {
  transform:scale(1.02);
}

/* MOBILE */
@media(max-width:768px){

  .container {
    padding:40px 16px; /* 👈 espaçamento lateral corrigido */
  }

  .gallery {
    grid-template-columns:1fr;
    gap:20px; /* 👈 espaço entre imagens */
  }

  .gallery img {
    border-radius:8px;
  }

}
</style>
</head>

<body>

<div id="swup">

  <!-- HERO -->
  <div class="hero">
    <img src="render-casa.jpg">
  </div>

  <!-- CONTEÚDO -->
  <div class="container">

    <a href="index.html" class="back">← Back to Home</a>

    <h1 class="reveal">Modern House</h1>

    <p class="reveal">
      High-end residential visualization focused on light, materials and atmosphere.
      The goal was to create a realistic and emotionally engaging architectural presentation.
    </p>

    <div class="gallery">
      <img src="render-casa.jpg" class="reveal">
      <img src="render-casa.jpg" class="reveal">
      <img src="render-casa.jpg" class="reveal">
      <img src="render-casa.jpg" class="reveal">
    </div>

  </div>

</div>

<!-- SWUP -->
<script src="https://unpkg.com/swup@4"></script>

<script>
const swup = new Swup();

function initAnimations(){
  const els=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });
  els.forEach(el=>obs.observe(el));
}

initAnimations();

swup.hooks.on('page:view', () => {
  initAnimations();
});
</script>

</body>
</html>
