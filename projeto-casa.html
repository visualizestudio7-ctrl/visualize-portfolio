<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern House | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Inter', sans-serif; background:#f2f2f2; }

h1 { font-family:'Playfair Display', serif; font-size:48px; }
p { color:#666; line-height:1.6; max-width:700px; }

/* ANIMAÇÃO */
.reveal { opacity:0; transform:translateY(60px); transition:1.2s cubic-bezier(0.22,1,0.36,1); }
.reveal.show { opacity:1; transform:translateY(0); }

/* HERO */
.hero { height:60vh; }
.hero img { width:100%; height:100%; object-fit:cover; }

/* CONTAINER */
.container { max-width:1100px; margin:auto; padding:80px 20px; }

/* GALERIA */
.gallery {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:30px;
margin-top:50px;
}

.gallery img {
width:100%;
border-radius:6px;
transition:0.5s;
}

.gallery img:hover { transform:scale(1.03); }

/* BACK */
.back {
display:inline-block;
margin-bottom:30px;
text-decoration:none;
color:black;
font-weight:500;
}
</style>
</head>

<body>

<div class="hero">
<img src="render-casa.jpg">
</div>

<div class="container">
<a href="index.html" class="back">← Back to Home</a>

<h1 class="reveal">Modern House</h1>

<p class="reveal">
High-end residential visualization focused on light, materials and atmosphere.
</p>

<div class="gallery">
<img src="render-casa.jpg" class="reveal">
<img src="render-casa.jpg" class="reveal">
<img src="render-casa.jpg" class="reveal">
</div>
</div>

<script>
const els=document.querySelectorAll('.reveal');
const obs=new IntersectionObserver(e=>{
e.forEach(i=>{if(i.isIntersecting)i.target.classList.add('show')});
});
els.forEach(el=>obs.observe(el));
</script>

</body>
</html>
