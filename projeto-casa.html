<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern House | Visualize Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f2f2f2;
}

/* TIPOGRAFIA */
h1 {
  font-family:'Playfair Display', serif;
  font-size:clamp(32px,5vw,56px);
  margin-bottom:20px;
}

p {
  color:#666;
  max-width:600px;
}

/* TRANSIÇÃO */
#swup {
  transition:0.6s cubic-bezier(0.22,1,0.36,1);
}

html.is-animating #swup {
  opacity:0;
  transform:translateY(20px);
}

html.is-leaving #swup {
  opacity:0;
  transform:scale(0.98);
}

/* ANIMAÇÃO */
.reveal {
  opacity:0;
  transform:translateY(60px);
  transition:1.2s cubic-bezier(0.22,1,0.36,1);
}

.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero {
  height:60vh;
}

.hero img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MESMO PADRÃO DA HOME */
.section {
  padding:80px;
}

.container {
  max-width:1100px;
  margin:auto;
}

/* BACK (AGORA CORRETO) */
.back {
  display:inline-block;
  margin-bottom:30px;
  color:black;
  text-decoration:none;
  font-weight:500;
}

.back:visited,
.back:active {
  color:black;
  text-decoration:none;
}

.back:hover {
  opacity:0.6;
}

/* GRID IGUAL À HOME */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px,1fr));
  gap:30px;
}

/* IMAGENS IGUAIS À HOME */
.project img {
  width:100%;
  max-width:420px;
  margin:0 auto;
  display:block;
  transition:0.6s;
}

.project img:hover {
  transform:scale(1.05);
}

/* CENTRALIZA TEXTO COMO NA HOME */
.project h3,
.project p {
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
}

/* MOBILE */
@media(max-width:768px){

  .section {
    padding:50px 20px;
  }

  .project img,
  .project h3,
  .project p {
    max-width:100%;
  }

}
</style>
</head>

<body>

<div id="swup">

  <!-- HERO -->
  <div class="hero">
    <img src="render-casa.jpg">
  </div>

  <!-- CONTEÚDO -->
  <div class="section">
    <div class="container">

      <a href="index.html" class="back">← Back to Home</a>

      <h1 class="reveal">Modern House</h1>

      <p class="reveal">
        High-end residential visualization focused on light, materials and atmosphere.
      </p>

      <!-- GRID DE IMAGENS -->
      <div class="grid">

        <div class="project reveal">
          <img src="render-casa.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa.jpg">
        </div>

        <div class="project reveal">
          <img src="render-casa.jpg">
        </div>

      </div>

    </div>
  </div>

</div>

<!-- SWUP -->
<script src="https://unpkg.com/swup@4"></script>

<script>
const swup = new Swup();

function initAnimations(){
  const els=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('show');
      }
    });
  });
  els.forEach(el=>obs.observe(el));
}

initAnimations();

swup.hooks.on('page:view', () => {
  initAnimations();
});
</script>

</body>
</html>
